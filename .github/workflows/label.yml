# This workflow will triage pull requests and apply a label based on the
# paths that are modified in the pull request, and on the PR's branch name.
#
# Configuration lives in .github/labeler.yml. For more information, see:
# https://github.com/actions/labeler

name: Labeler
on: [pull_request_target]

jobs:
  label:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/labeler@v5
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        sync-labels: true
